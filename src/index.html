        // Set up audio analyzer
        async function setupAudioAnalyzer() {
            try {
                // Check if we already have an analyzer set up
                if (webampInstance.analyzer) {
                    return;
                }

                // Create audio context and analyzer only if they don't exist
                if (!webampInstance.audioContext) {
                    webampInstance.audioContext = new (window.AudioContext || window.webkitAudioContext)();
                }
                
                if (!webampInstance.analyzer) {
                    webampInstance.analyzer = webampInstance.audioContext.createAnalyser();
                    webampInstance.analyzer.fftSize = 256;
                    webampInstance.audioData = new Uint8Array(webampInstance.analyzer.frequencyBinCount);
                }

                // Function to connect audio
                const connectAudio = () => {
                    return new Promise((resolve, reject) => {
                        // Get Webamp's media element
                        const state = webampInstance.store.getState();
                        const media = state?.media;
                        
                        if (!media) {
                            reject(new Error('No media state available'));
                            return;
                        }

                        // Get the actual audio element from Webamp
                        const audioElement = document.querySelector('#webamp audio');
                        if (!audioElement) {
                            reject(new Error('Audio element not found'));
                            return;
                        }

                        try {
                            // Create and connect the source only if it doesn't exist
                            if (!webampInstance.source) {
                                webampInstance.source = webampInstance.audioContext.createMediaElementSource(audioElement);
                            }
                            
                            // Connect the nodes
                            webampInstance.source.connect(webampInstance.analyzer);
                            webampInstance.analyzer.connect(webampInstance.audioContext.destination);
                            
                            resolve(true);
                        } catch (e) {
                            console.error('Error connecting audio:', e);
                            reject(e);
                        }
                    });
                };

                // Try to connect with increasing delays
                let retries = 0;
                const maxRetries = 5;
                const tryConnect = async () => {
                    try {
                        await connectAudio();
                    } catch (e) {
                        if (retries < maxRetries) {
                            retries++;
                            // Wait longer between each retry (exponential backoff)
                            const delay = Math.min(1000 * Math.pow(2, retries), 10000);
                            setTimeout(tryConnect, delay);
                        }
                    }
                };

                // Resume audio context if it's suspended
                if (webampInstance.audioContext.state === 'suspended') {
                    await webampInstance.audioContext.resume();
                }

                // Start trying to connect
                tryConnect();

            } catch (e) {
                console.error('Error in setupAudioAnalyzer:', e);
            }
        }

        // Legendarium logo orbiting animation
        function startLegendariumLogoAnimation() {
            const logo = document.getElementById('legendarium-logo');
            if (!logo) return;
            let start = null;
            let isHovered = false;

            // Add hover listeners
            const logoLink = document.getElementById('legendarium-logo-link');
            logoLink.addEventListener('mouseenter', () => isHovered = true);
            logoLink.addEventListener('mouseleave', () => isHovered = false);

            function animate(ts) {
                if (!start) start = ts;
                const t = (ts - start) / 1000;
                
                if (!isHovered) {
                    // Only orbit and spin when not hovered
                    const orbitRadiusX = 4; // px
                    const orbitRadiusY = 2; // px
                    const orbitSpeed = 0.15; // radians/sec
                    const angle = t * orbitSpeed;
                    const x = Math.cos(angle) * orbitRadiusX;
                    const y = Math.sin(angle) * orbitRadiusY;
                    const spin = Math.sin(t * 0.25) * 90; // -90deg to +90deg
                    logo.style.transform = `translate(${x}px, ${y}px) rotateY(${spin}deg)`;
                }
                requestAnimationFrame(animate);
            }
            requestAnimationFrame(animate);
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', () => {
            // Start preloading backgrounds immediately
            preloadBackgrounds();
            
            // Setup password validation
            setupPasswordValidation();
            
            // Remove animation toggle button setup
            window.basePositions = null;

            // Hide the password overlay
            const passwordOverlay = document.getElementById('password-overlay');
            if (passwordOverlay) {
                passwordOverlay.style.opacity = '1';
                passwordOverlay.style.pointerEvents = 'auto';
            }

            // Focus on the password input
            setTimeout(() => {
                document.getElementById('password-input').focus();
            }, 500);

            // Call the animation function if needed
            if (!window.legendariumLogoAnimStarted) {
                window.legendariumLogoAnimStarted = true;
                startLegendariumLogoAnimation();
            }
        });
        
        // Remove animation toggle related styles
        document.head.insertAdjacentHTML('beforeend', `
            <style>
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                    20%, 40%, 60%, 80% { transform: translateX(5px); }
                }
                
                .shake {
                    animation: shake 0.5s;
                }
            </style>
        `);

        // Modify resize handler to always center if needed
        window.addEventListener('resize', () => {
            centerWindows();
        });

        // Add function to handle background flickering effects
        function setupBackgroundFlicker() {
            if (!webampInstance) {
                // If analyzer isn't ready yet, try again later
                setTimeout(setupBackgroundFlicker, 1000);
                return;
            }
            
            const flickerOverlay = document.querySelector('.background-flicker-overlay');
            const vignetteOverlay = document.querySelector('.background-vignette');
            const bloomEffect = document.querySelector('.background-bloom');
            const flashEffect = document.querySelector('.background-flash');
            
            if (!flickerOverlay || !vignetteOverlay || !bloomEffect || !flashEffect) {
                console.error('Missing overlay elements for audio effects');
                return;
            }
            
            let lastUpdate = 0;
            let lastAudioLevel = 0;
            
            // Beat detection state
            let beatState = {
                energyHistory: new Array(30).fill(0),
                historyIndex: 0,
                lastBeatTime: 0,
                beatThreshold: 1.5, // How much energy increase triggers a beat
                minBeatInterval: 200, // Minimum ms between beats (300ms = 200bpm max)
                beatDetected: false,
                beatCount: 0,
                beatDecay: 0,
                pulsePhase: 0,
                vignetteIntensity: 0.7,
                currentMode: 'dark'
            };
            
            // Simple darker modes
            const darkMode = {
                baseColor: 'rgba(0, 0, 0, 0.7)',
                mixBlendMode: 'multiply'
            };
            
            // Brighter mode for higher intensity
            const brightMode = {
                baseColor: 'rgba(255, 255, 255, 0.3)',
                mixBlendMode: 'screen'
            };
            
            // Start with dark mode
            flickerOverlay.style.backgroundColor = darkMode.baseColor;
            flickerOverlay.style.mixBlendMode = darkMode.mixBlendMode;
            
            function updateFlickerEffect(timestamp) {
                // Update at 60fps
                if (timestamp - lastUpdate < 16) {
                    requestAnimationFrame(updateFlickerEffect);
                    return;
                }
                lastUpdate = timestamp;
                
                try {
                    // Get current audio level (0-1)
                    const audioLevel = getAudioLevel();
                    
                    // Calculate time delta and update pulse phase
                    const deltaTime = timestamp - (beatState.lastTime || timestamp);
                    beatState.lastTime = timestamp;
                    beatState.pulsePhase += deltaTime * 0.001 * (0.3 + audioLevel * 2);
                    
                    // Smooth transitions between audio levels with minimal smoothing
                    // Use faster response for increasing levels to catch peaks
                    const isIncreasing = audioLevel > lastAudioLevel + 0.05;
                    const smoothingFactor = isIncreasing ? 0.6 : 0.2; // Faster response to increases
                    const smoothedAudioLevel = lastAudioLevel + (audioLevel - lastAudioLevel) * smoothingFactor;
                    lastAudioLevel = smoothedAudioLevel;
                    
                    // ------------------------
                    // Beat detection algorithm
                    // ------------------------
                    // Store current energy level in history
                    beatState.energyHistory[beatState.historyIndex] = audioLevel;
                    beatState.historyIndex = (beatState.historyIndex + 1) % beatState.energyHistory.length;
                    
                    // Calculate average energy over recent history
                    const recentAverage = beatState.energyHistory.reduce((sum, val) => sum + val, 0) / 
                                          beatState.energyHistory.length;
                    
                    // Beat is detected when current level exceeds average by threshold
                    // AND enough time has passed since last beat
                    const beatTimeThreshold = timestamp - beatState.lastBeatTime > beatState.minBeatInterval;
                    const energyThreshold = audioLevel > recentAverage * beatState.beatThreshold;
                    const newBeat = beatTimeThreshold && energyThreshold && audioLevel > 0.15;
                    
                    if (newBeat && !beatState.beatDetected) {
                        beatState.beatDetected = true;
                        beatState.lastBeatTime = timestamp;
                        beatState.beatCount++;
                        beatState.beatDecay = 1.0; // Full intensity
                        
                        // Flash more intensely on beat
                        flashBeat(audioLevel);
                    } else {
                        beatState.beatDetected = false;
                        
                        // Decay the beat effect rapidly
                        beatState.beatDecay *= 0.85;
                    }
                    
                    // Determine if we should switch modes based on audio intensity
                    const threshold = 0.6; // Threshold for switching to bright mode
                    const newMode = smoothedAudioLevel > threshold ? 'bright' : 'dark';
                    
                    if (newMode !== beatState.currentMode) {
                        beatState.currentMode = newMode;
                        
                        // Apply the new mode to the overlay
                        if (newMode === 'bright') {
                            flickerOverlay.style.backgroundColor = brightMode.baseColor;
                            flickerOverlay.style.mixBlendMode = brightMode.mixBlendMode;
                        } else {
                            flickerOverlay.style.backgroundColor = darkMode.baseColor;
                            flickerOverlay.style.mixBlendMode = darkMode.mixBlendMode;
                        }
                    }
                    
                    // Calculate flicker value based on audio level and beat
                    let flickerValue;
                    
                    if (smoothedAudioLevel < 0.3) {
                        // Subtle, slow pulse at low levels with beat enhancement
                        flickerValue = 0.3 + 0.1 * Math.sin(beatState.pulsePhase * 0.3) + beatState.beatDecay * 0.2;
                    } else if (smoothedAudioLevel < 0.6) {
                        // More dynamic pulse with faster response
                        const pulseBase = 0.4 + 0.2 * Math.sin(beatState.pulsePhase * 0.7);
                        const secondaryPulse = 0.1 * Math.sin(beatState.pulsePhase * 1.3);
                        const randomComponent = 0.1 * (Math.random() - 0.5) * smoothedAudioLevel * 3;
                        const beatComponent = beatState.beatDecay * 0.4; // Strong beat influence
                        flickerValue = pulseBase + secondaryPulse + randomComponent + beatComponent;
                    } else {
                        // Strong pulsing for high levels with stuttering
                        const stutterFactor = Math.floor(timestamp / (20 + Math.random() * 30)) % 2;
                        const hardPulse = Math.sin(beatState.pulsePhase * 4) > 0.2 ? 1 : 0.7;
                        const beatComponent = beatState.beatDecay * 0.5; // Very strong beat influence
                        
                        flickerValue = 0.6 + 
                            0.3 * smoothedAudioLevel + 
                            0.3 * hardPulse * stutterFactor +
                            beatComponent;
                    }
                    
                    // Add randomness proportional to audio level
                    flickerValue += (Math.random() - 0.5) * 0.15 * smoothedAudioLevel;
                    
                    // Clamp values
                    flickerValue = Math.max(0, Math.min(1, flickerValue));
                    
                    // Apply the flicker effect
                    flickerOverlay.style.opacity = flickerValue;
                    
                    // Update vignette based on audio level (inverse relationship)
                    // Stronger vignette during quiet, lighter during loud parts
                    const targetVignette = 0.7 - (smoothedAudioLevel * 0.4) - (beatState.beatDecay * 0.2);
                    beatState.vignetteIntensity += (targetVignette - beatState.vignetteIntensity) * 0.1;
                    vignetteOverlay.style.opacity = Math.max(0.2, Math.min(0.8, beatState.vignetteIntensity));
                    
                    // Update bloom effect
                    // Only show bloom at higher audio levels
                    let bloomOpacity = 0;
                    if (smoothedAudioLevel > 0.4) {
                        // Scale normalized level to reasonable bloom opacity
                        const normalizedBloom = (smoothedAudioLevel - 0.4) / 0.6;
                        // Add beat influence to bloom
                        bloomOpacity = (Math.pow(normalizedBloom, 1.5) * 0.9) + (beatState.beatDecay * 0.4);
                        
                        // Add color variance based on intensity
                        const r = 255;
                        const g = Math.floor(220 + normalizedBloom * 35); // 220-255
                        const b = Math.floor(180 + normalizedBloom * 75); // 180-255
                        
                        // Create bloom gradient with appropriate size
                        // Larger during beats
                        const size = 30 + normalizedBloom * 40 + (beatState.beatDecay * 20); // 30-70% size + beat expansion
                        const rgbColor = `rgba(${r}, ${g}, ${b}, ${0.5 + normalizedBloom * 0.5})`;
                        bloomEffect.style.background = `radial-gradient(circle at center, ${rgbColor} 0%, rgba(255, 255, 255, 0) ${size}%)`;
                        bloomEffect.style.filter = `blur(${5 + Math.floor(normalizedBloom * 15)}px)`;
                    }
                    
                    // Apply bloom with immediate response for visibility
                    bloomEffect.style.opacity = Math.min(1, bloomOpacity);
                    
                } catch (e) {
                    console.error('Error in background flicker effect:', e);
                }
                
                requestAnimationFrame(updateFlickerEffect);
            }
            
            // Function to create a flash on beat detection
            function flashBeat(intensity) {
                // Check if we're in a full frequency moment for more intense flashes
                const isFullFrequency = detectFullFrequency();
                
                // Base flash intensity on audio level and whether it's a full spectrum moment
                const flashIntensity = isFullFrequency ? intensity * 1.4 : intensity;
                
                // Apply flash with rapid fade
                flashEffect.style.opacity = Math.min(1, flashIntensity * 0.8);
                
                // Quick falloff for the flash
                setTimeout(() => {
                    flashEffect.style.opacity = Math.min(0.5, flashIntensity * 0.4);
                    
                    setTimeout(() => {
                        flashEffect.style.opacity = '0';
                    }, 60);
                }, 60);
            }
            
            // Helper function to detect full frequency spectrum activity
            function detectFullFrequency() {
                try {
                    if (!webampInstance?.analyzer || !webampInstance?.audioData) {
                        return false;
                    }
                    
                    // Get frequency data
                    webampInstance.analyzer.getByteFrequencyData(webampInstance.audioData);
                    
                    // Analyze key frequency bands
                    let bassSum = 0, midsSum = 0, highsSum = 0;
                    
                    // Check specific frequency bands (bass: 0-4, mids: 5-20, highs: 21+)
                    for (let i = 0; i < 5; i++) {
                        bassSum += webampInstance.audioData[i] || 0;
                    }
                    
                    for (let i = 5; i < 21; i++) {
                        midsSum += webampInstance.audioData[i] || 0;
                    }
                    
                    for (let i = 21; i < 40; i++) {
                        highsSum += webampInstance.audioData[i] || 0;
                    }
                    
                    // Normalize to 0-1 scale
                    const bassLevel = bassSum / (5 * 255);
                    const midsLevel = midsSum / (16 * 255);
                    const highsLevel = highsSum / (19 * 255);
                    
                    // Check if all frequency bands are active (with appropriate thresholds)
                    return (bassLevel > 0.25 && midsLevel > 0.3 && highsLevel > 0.25);
                    
                } catch (e) {
                    console.error('Error detecting full frequency:', e);
                    return false;
                }
            }
            
            // Start the effect
            requestAnimationFrame(updateFlickerEffect);
            
            // Log that we started the effect
            console.log('Audio-reactive background effects initialized with beat detection');
        }

        // Simplified function to get audio level - more reliable
        function getAudioLevel() {
            // Get the current state from Webamp
            const state = webampInstance?.store?.getState();
            const media = state?.media;
            
            if (!media) return 0;
            
            // Check if we're actually playing
            const isPlaying = media.status === "PLAYING" && !media.waiting;
            if (!isPlaying) {
                return 0;
            }
            
            let audioLevel = 0;
            
            // Try to get data from analyzer if available
            if (webampInstance?.analyzer && webampInstance?.audioData) {
                try {
                    // Get frequency data
                    webampInstance.analyzer.getByteFrequencyData(webampInstance.audioData);
                    
                    // Use a simple average of frequency data for reliability
                    let sum = 0;
                    const count = Math.min(webampInstance.audioData.length, 128); // Use first 128 bins or less
                    
                    for (let i = 0; i < count; i++) {
                        sum += webampInstance.audioData[i];
                    }
                    
                    // Normalize to 0-1 range
                    audioLevel = sum / (count * 255);
                    
                    // Apply a slight curve for better visualization
                    audioLevel = Math.pow(audioLevel, 1.2);
                    
                } catch (e) {
                    console.error('Error getting audio data:', e);
                    // Fall back to volume-based method
                    audioLevel = 0;
                }
            }
            
            // If analyzer failed or isn't available, fallback to volume
            if (audioLevel === 0) {
                // Get the volume from the state and normalize it
                const volume = state.media.volume || 0;
                const normalizedVolume = volume / 100;
                audioLevel = normalizedVolume * 0.7; // Scale down a bit for fallback
            }
            
            // Ensure reasonable bounds and add a minimum level to ensure some activity
            return Math.max(0.05, Math.min(1, audioLevel));
        }
