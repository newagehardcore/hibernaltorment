            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            font-family: Arial, sans-serif;
            cursor: auto !important;
            /* Prevent scrolling */
            position: fixed;
            background-color: #000; /* Ensure body background is black */

        /* Overlay for the glow effect - kept for now, adjust z-index */
        #glow-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            pointer-events: none;
            z-index: 1; /* Below halo-reveal-layer */
            animation: flicker 5s infinite alternate;
            opacity: 0; /* Start with no opacity */
            transition: opacity 10s cubic-bezier(0.4, 0, 0.2, 1); /* Super gradual 10 second fade in */
        }
        
        /* Candle flicker animation */
        @keyframes flicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                opacity: 0.6;
            }
            20%, 24%, 55% {
                opacity: 0.4;
            }
            40%, 42% {
                opacity: 0.5;
            }
            60%, 80%, 85% {
                opacity: 0.7;
            }
            90%, 95% {
                opacity: 0.8;
            }
        }
        
        #webamp-container {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 10;  /* Above background */
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }

        /* Apply zoom only to Webamp windows */
        #webamp {
            zoom: var(--webamp-zoom) !important;
            -moz-transform: scale(var(--webamp-zoom));
            -moz-transform-origin: top left;
        }
        
        /* Adjust positioning for scaled elements */
        #webamp .window {
            filter: 
                drop-shadow(0 0 10px rgba(0, 0, 0, 0.9))
                drop-shadow(0 0 20px rgba(0, 0, 0, 0.7))
                drop-shadow(0 0 100px rgba(0, 0, 0, 0.8))

            will-change: filter, transform;
            position: relative;
            z-index: 2;

        /* Additional glow effect for windows */
        #webamp .window::after {
            content: '';

            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            pointer-events: none;
            z-index: -1;
        }
        
        /* Remove loading text styles */

        /* Override ALL cursor styles */

        .window, .webamp-region, #webamp, #webamp * {

            margin-top: 15px;

            position: fixed;

            left: 0;

        // Function to convert binary data to base64
        async function fetchAndConvertToBase64(url) {
            try {
                const response = await fetch(url);
                if (!response.ok) {
                    throw new Error(`Failed to fetch ${url}: ${response.status} ${response.statusText}`);
                }
                const blob = await response.blob();
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onloadend = () => resolve(reader.result.split(',')[1]);
                    reader.onerror = reject;
                    reader.readAsDataURL(blob);
                });
            } catch (error) {
                console.error('Error fetching skin:', error);
                return null;
            }
        }

                const response = await fetch(url);
                const blob = await response.blob();
                return URL.createObjectURL(blob);
            } catch (error) {
                console.error('Error preloading audio:', error);
                return url; // Fallback to original URL if fetch fails

        // Modified track change handler with detailed logging
        function handleTrackChange(trackInfo) {
            // Immediately handle track change
            requestAnimationFrame(() => {
                console.log('DEBUG - Track Change Event:', {
                    trackInfo,
                    url: trackInfo?.url,
                    title: trackInfo?.metaData?.title,
                    defaultName: trackInfo?.defaultName
                });
                
                if (!trackInfo) return;
                
                // Find the track index by matching the title
                let trackIndex = -1;
                
                // First try to match by URL if available
                if (trackInfo.url) {
                    trackIndex = tracksData.findIndex(track => 
                        track.url === trackInfo.url || 
                        track.url.endsWith(trackInfo.url)
                    );
                    console.log('URL matching result:', {
                        trackIndex,
                        incomingUrl: trackInfo.url,
                        matchedTrack: trackIndex !== -1 ? tracksData[trackIndex] : null
                    });
                }
                
                // If URL matching failed, try title matching
                if (trackIndex === -1) {
                    trackIndex = tracksData.findIndex(track => {
                        // Try to match by title from metadata
                        if (trackInfo.metaData?.title && track.metaData?.title === trackInfo.metaData.title) {
                            return true;
                        }
                        
                        // Try to match by defaultName
                        if (trackInfo.defaultName && track.defaultName === trackInfo.defaultName) {
                            return true;
                        }
                        
                        // Try to match by filename
                        const trackFileName = track.url.split('/').pop();
                        const incomingFileName = (trackInfo.url || '').split('/').pop();
                        if (trackFileName === incomingFileName) {
                            return true;
                        }
                        
                        return false;
                    });
                }

                console.log('DEBUG - Track Matching Result:', {
                    finalTrackIndex: trackIndex,
                    matchedTrack: trackIndex !== -1 ? tracksData[trackIndex] : null,
                    associatedBackground: trackIndex !== -1 ? trackBackgrounds[trackIndex] : null
                });
                
                if (trackIndex !== -1 && trackBackgrounds[trackIndex]) {
                    console.log('Switching background for track index:', trackIndex);
                    switchBackground(trackIndex);
                } else {
                    console.log('Could not find matching track or background:', {
                        trackIndex,
                        hasBackground: trackIndex !== -1 ? !!trackBackgrounds[trackIndex] : false
                    });
                }
            });
        }

        // Function to handle background transitions
        function switchBackground(trackIndex) {
            console.log('Switching background for track:', trackIndex);
            
            const currentBg = document.getElementById('current-background');
            const backgroundConfig = trackBackgrounds[trackIndex];

            if (!backgroundConfig) {
                console.log('No background defined for track index:', trackIndex);
                return;
            }

            // Create new image or use preloaded one
            const newImage = backgroundConfig.preloadedImage ? 
                backgroundConfig.preloadedImage.cloneNode(true) : 
                new Image();
            
            newImage.className = 'background-gif';
            
            // Set initial state
            newImage.style.transition = 'none';
            newImage.style.opacity = '0';

            const handleImageReady = () => {
                // Clear any existing content and timeouts
                if (window.bgTransitionTimeout) {
                    clearTimeout(window.bgTransitionTimeout);
                }
                
                // Remove any existing images
                currentBg.innerHTML = '';
                
                // Add new image
                currentBg.appendChild(newImage);
                
                // Force reflow
                void newImage.offsetHeight;
                
                // Set up fade in
                requestAnimationFrame(() => {
                    newImage.style.transition = `opacity ${backgroundConfig.fadeIn}s ease-in`;
                    newImage.style.opacity = '1';
                });
            };

            // Handle image loading
            if (backgroundConfig.preloadedImage) {
                handleImageReady();
            } else {
                newImage.onload = handleImageReady;
                newImage.onerror = (error) => {
                    console.error('Error loading background image:', error);
                };
                newImage.src = backgroundConfig.url;
            }
        }

        // Add animation state variable - set to false by default
        let isAnimationEnabled = false;

        // Function to center windows
        function centerWindows() {
            if (!webampInstance || !webampInstance.store) return;

            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;
            // Get zoom factor from CSS variable
            const zoomFactor = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--webamp-zoom'));
            
            // Original Webamp dimensions
            const playerWidth = 275;
            const totalHeight = 500;
            
            // Calculate center position
            const centerX = Math.max(0, Math.floor((windowWidth - (playerWidth * zoomFactor)) / 2 / zoomFactor));
            const centerY = Math.max(0, Math.floor((windowHeight - (totalHeight * zoomFactor)) / 2 / zoomFactor));

            // Store these positions for animation reference
            window.lastKnownPositions = {
                main: { x: centerX, y: centerY },
                equalizer: { x: centerX, y: centerY + 116 },
                playlist: { x: centerX, y: centerY + 232 }
            };

            // Update window positions
            webampInstance.store.dispatch({
                type: 'UPDATE_WINDOW_POSITIONS',
                positions: window.lastKnownPositions,
                absolute: true
            });
        }

        // Function to get current window positions
        function getCurrentWindowPositions() {
            const state = webampInstance.store.getState();
            const genWindows = state?.windows?.genWindows;
            
            if (!genWindows) return null;
            
            // Extract positions from the nested position objects
            const positions = {};
            Object.entries(genWindows).forEach(([windowId, window]) => {
                if (window?.position?.x != null && window?.position?.y != null) {
                    positions[windowId] = {
                        x: Math.round(window.position.x),
                        y: Math.round(window.position.y)
                    };
                }
            });
            
            // Log extracted positions
            console.log('Extracted positions:', positions);
            
            return positions;
        }

        // Function to toggle animation
        function toggleAnimation() {
            console.log('Toggle animation called');
            
            if (!webampInstance?.store) {
                console.error('Webamp not ready');
                return;
            }
            
            // Get current positions
            const currentPositions = getCurrentWindowPositions();
            
            if (!currentPositions || Object.keys(currentPositions).length === 0) {
                console.error('Could not get current window positions');
                return;
            }
            
            // Store positions before toggle
            lastKnownPositions = { ...currentPositions };
            console.log('Stored positions before toggle:', lastKnownPositions);
            
            // Toggle state
            isAnimationEnabled = !isAnimationEnabled;
            
            // Update button state
            const toggleButton = document.getElementById('animation-toggle');
            if (isAnimationEnabled) {
                toggleButton.classList.add('active');
                startHauntedAnimation();
            } else {
                toggleButton.classList.remove('active');
                stopAnimation();
                
                // When stopping animation, restore the last known positions
                if (lastKnownPositions && Object.keys(lastKnownPositions).length > 0) {
                    // Dispatch a single action to update all window positions
                    webampInstance.store.dispatch({
                        type: 'UPDATE_WINDOW_POSITIONS',
                        positions: lastKnownPositions,
                        absolute: true
                    });
                }
            }
        }

        // Modified animation function
        function startHauntedAnimation() {
            console.log('Starting haunted animation...');
            
            // Clean up any existing animation
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
            
            // Get initial positions
            const currentPositions = getCurrentWindowPositions();
            
            if (!currentPositions || Object.keys(currentPositions).length === 0) {
                console.error('Could not get window positions for animation');
                return;
            }
            
            // Use current positions as base positions
            const basePositions = { ...currentPositions };
            console.log('Starting animation with base positions:', basePositions);
            
            let time = 0;
            const ANIMATION_SPEED = 0.015;
            const ANIMATION_RADIUS = 5;
            
            function animate() {
                if (!isAnimationEnabled || !webampInstance?.store) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                    return;
                }

                const state = webampInstance.store.getState();
                const genWindows = state?.windows?.genWindows;
                if (!genWindows) return;
                
                const isDragging = Object.values(genWindows).some(w => w?.dragging);
                
                if (isDragging) {
                    // Update base positions and last known positions while dragging
                    const newPositions = getCurrentWindowPositions();
                    if (newPositions && Object.keys(newPositions).length > 0) {
                        Object.assign(basePositions, newPositions);
                        lastKnownPositions = { ...newPositions };
                    }
                } else {
                    time += ANIMATION_SPEED;
                    
                    // Calculate new positions
                    const xOffset = Math.sin(time) * ANIMATION_RADIUS;
                    const yOffset = Math.cos(time) * ANIMATION_RADIUS;
                    
                    // Create new positions object
                    const newPositions = {};
                    Object.entries(basePositions).forEach(([windowId, basePos]) => {
                        newPositions[windowId] = {
                            x: Math.round(basePos.x + xOffset),
                            y: Math.round(basePos.y + yOffset)
                        };
                    });
                    
                    // Update all windows at once
                    webampInstance.store.dispatch({
                        type: 'UPDATE_WINDOW_POSITIONS',
                        positions: newPositions,
                        absolute: true
                    });
                }
                
                animationId = requestAnimationFrame(animate);
            }
            
            animationId = requestAnimationFrame(animate);
        }

        function stopAnimation() {
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }
        }

        // Function to fix cursor issues
        function fixCursorIssues() {
            // Override any custom cursor styles on ALL elements
            document.querySelectorAll('*').forEach(el => {
                el.style.cursor = 'auto';
            });
            
            // Add a style tag with !important rules
            const styleTag = document.createElement('style');
            styleTag.textContent = `
                * { cursor: auto !important; }
                .webamp-region, #webamp, .window, .window * { cursor: auto !important; }
                .playlist-top, .playlist-middle, .playlist-bottom { cursor: auto !important; }
            `;
            document.head.appendChild(styleTag);
        }

        // Main function to initialize Webamp
        async function initWebamp() {
            try {
                // Clean up any previous instances
                cleanup();
                
                // Initialize animation state
                isAnimationEnabled = false;
                window.basePositions = null;
                
                // Set up animation toggle button
                const animToggleButton = document.getElementById('animation-toggle');
                if (animToggleButton) {
                    // Remove any existing listeners
                    animToggleButton.removeEventListener('click', toggleAnimation);
                    // Add fresh click listener
                    animToggleButton.addEventListener('click', toggleAnimation);
                    // Reset to inactive state
                    animToggleButton.classList.remove('active');
                    console.log('Animation toggle button initialized');
                }

                // Add transition styles
                const styleSheet = document.createElement('style');
                styleSheet.textContent = `
                    #webamp-container {
                        opacity: 0;
                        transition: opacity 1s ease-in-out;
                    }
                    #webamp {
                        zoom: var(--webamp-zoom) !important;
                        -moz-transform: scale(var(--webamp-zoom));
                        -moz-transform-origin: top left;
                    }
                    .webamp-region {
                        transition: all 0.3s ease-out;
                    }
                `;
                document.head.appendChild(styleSheet);

                // Get the custom skin if needed
                let skinOption = undefined;
                
                if (usesCustomSkin) {
                    const skinUrl = "GKSkin.wsz";
                    const skinBase64 = await fetchAndConvertToBase64(skinUrl);
                    
                    if (skinBase64) {
                        skinOption = {
                            url: `data:application/zip;base64,${skinBase64}`
                        };
                    }
                }

                // First, preload all audio files
                const tracks = await Promise.all(tracksData.map(async (track) => {
                    // Create a blob URL for each track
                    const blobUrl = await preloadAudioFile(track.url);
                    return {
                        ...track,
                        url: blobUrl,
                        blob: true // Tell Webamp this is a blob URL
                    };
                }));

                // Calculate center position
                const windowWidth = window.innerWidth;
                const windowHeight = window.innerHeight;
                // Get zoom factor from CSS variable
                const zoomFactor = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--webamp-zoom'));
                
                // Original Webamp dimensions
                const playerWidth = 275;  // Original size
                const totalHeight = 500;  // Original size
                
                // Adjust the centering calculation to account for the actual visible area
                const scaledPlayerWidth = playerWidth * zoomFactor;
                const scaledTotalHeight = totalHeight * zoomFactor;
                
                // Divide by zoom factor to get the actual position in the zoomed space
                const centerX = Math.max(0, Math.floor((windowWidth - scaledPlayerWidth) / 2 / zoomFactor));
                const centerY = Math.max(0, Math.floor((windowHeight - scaledTotalHeight) / 2 / zoomFactor));

                // Initialize Webamp with preloaded tracks
                const webampOptions = {
                    initialTracks: tracks,
                    initialSkin: skinOption,
                    zIndex: 100,
                    enableHotkeys: false,
                    __initialWindowLayout: {
                        main: { position: { x: centerX, y: centerY } },
                        equalizer: { position: { x: centerX, y: centerY + 116 } },
                        playlist: { 
                            position: { x: centerX, y: centerY + 232 },
                            size: [0, 5]
                        }
                    }
                };

                console.log('Initializing Webamp with options:', webampOptions);
                webampInstance = new Webamp(webampOptions);

                // Render Webamp and set up the player
                await webampInstance.renderWhenReady(document.getElementById('webamp-container'));
                
                // Wait for skin to be loaded
                await webampInstance.skinIsLoaded();

                // Intercept Redux store to prevent playlist reordering
                const originalDispatch = webampInstance.store.dispatch;
                webampInstance.store.dispatch = (action) => {
                    if (action.type === 'REMOVE_TRACKS' || 
                        action.type === 'ADD_TRACK_FROM_URL' || 
                        action.type === 'SET_MEDIA' || 
                        action.type === 'PLAYLIST_REORDER') {
                        console.log('Blocked action:', action.type);
                        return;
                    }
                    return originalDispatch(action);
                };

                // Show the player
                const container = document.getElementById('webamp-container');
                container.style.opacity = '1';

                // Initialize background system
                initBackgroundSystem();

                // Set up track change handler
                webampInstance.onTrackDidChange(handleTrackChange);

                // Center windows initially since animation is off by default
                centerWindows();

                // Ensure animation toggle is properly initialized
                const animationToggleBtn = document.getElementById('animation-toggle');
                if (animationToggleBtn) {
                    animationToggleBtn.removeEventListener('click', toggleAnimation);
                    animationToggleBtn.addEventListener('click', toggleAnimation);
                    animationToggleBtn.style.display = 'block';
                    console.log('Animation toggle button re-initialized after Webamp load');
                }

                // Add essential click handlers
                const playlistContainer = document.querySelector('#webamp .playlist-window');
                if (playlistContainer) {
                    // Prevent right-click
                    playlistContainer.addEventListener('contextmenu', (e) => {
                        e.preventDefault();
                        e.stopPropagation();
                        return false;
                    }, true);

                    // Handle double-clicks for play
                    playlistContainer.addEventListener('dblclick', (e) => {
                        const trackEl = e.target.closest('.playlist-track');
                        if (trackEl) {
                            const tracks = document.querySelectorAll('#webamp .playlist-track');
                            const index = Array.from(tracks).indexOf(trackEl);
                            if (index !== -1) {
                                webampInstance.store.dispatch({ 
                                    type: "SET_CURRENT_TRACK",
                                    id: index 
                                });
                                setTimeout(() => webampInstance.play(), 50);
                            }
                        }
                    });
                }

                // Fade in the initial background
                setTimeout(() => {
                    const currentBg = document.getElementById('current-background');
                    currentBg.classList.add('active');
                }, 1000);

                // Fade in the halo and glow effects with a longer delay
                setTimeout(() => {
                    const glowOverlay = document.getElementById('glow-overlay');
                    if (glowOverlay) glowOverlay.style.opacity = '1';
                }, 3000);

                // Set the title using direct skin data modification
                try {
                    // Access the skin data in the Redux store
                    const state = webampInstance.store.getState();
                    if (state && state.display && state.display.skinGenLetterWidths) {
                        // Directly dispatch an action to update the skinInfo which controls the title
                        webampInstance.store.dispatch({
                            type: "SET_SKIN_DATA",
                            data: {
                                skinInfo: {
                                    name: "TEST"
                                }
                            }
                        });
                        
                        // Also try the window info update as backup
                        webampInstance.store.dispatch({
                            type: "UPDATE_WINDOW_INFO",
                            window: "main",
                            info: {
                                title: "TEST"
                            }
                        });
                    }
                } catch (e) {
                    console.error("Error setting title:", e);
                }

                // Clean up blob URLs when Webamp closes
                webampInstance.onWillClose(() => {
                    tracks.forEach(track => {
                        if (track.url.startsWith('blob:')) {
                            URL.revokeObjectURL(track.url);
                        }
                    });
                    cleanup();
                });

                return webampInstance;
            } catch (error) {
                console.error("Error initializing Webamp:", error);
                return null;
            }
        }

        // Function to play first track using Webamp API
        function playFirstTrack() {
            if (!webampInstance) {
                console.error("Webamp not initialized");
                return;
            }
            
            try {
                console.log("Playing first track...");
                
                // Make sure track is selected first
                webampInstance.store.dispatch({ 
                    type: "SET_CURRENT_TRACK",
                    id: 0 
                });
                
                // Force the play button to be "unpressed" before pressing it again
                webampInstance.store.dispatch({ type: "STOP" });
                
                // Short delay to ensure track is loaded
                setTimeout(() => {
                    // Try multiple methods to ensure playback starts
                    webampInstance.play();
                    
                    // Also try the direct Redux action
                    webampInstance.store.dispatch({ type: "PLAY" });
                    
                    console.log("Play commands sent to Webamp");
                }, 200);
            } catch (e) {
                console.error("Error playing track:", e);
            }
        }

        // Function to play a specific track by index
        function playTrackByIndex(index) {
            if (!webampInstance) return;
            
            try {
                // First select the track
                webampInstance.store.dispatch({ 
                    type: "SET_CURRENT_TRACK",
                    id: index 
                });
                
                // Then play it
                setTimeout(() => {
                    webampInstance.play();
                }, 100);
            } catch (e) {
                console.error("Error playing track:", e);
            }
        }

        // Set up player controls using official Webamp API
        function setupPlayerControls() {
            // Wait a moment to ensure Webamp is fully initialized
            setTimeout(() => {
                if (!webampInstance) return;

                // Set up double-click handler using Webamp's API
                const handleDoubleClick = (e) => {
                    const trackEl = e.target.closest('.playlist-track');
                    if (trackEl) {
                        const tracks = document.querySelectorAll('#webamp .playlist-track');
                        const index = Array.from(tracks).indexOf(trackEl);
                        if (index !== -1) {
                            // Use Webamp's store to change tracks
                            webampInstance.store.dispatch({ 
                                type: "SET_CURRENT_TRACK",
                                id: index 
                            });
                            // Play the track
                            setTimeout(() => webampInstance.play(), 50);
                        }
                    }
                };

                // Add double-click listener to playlist
                const playlistEl = document.querySelector('#webamp .playlist-window');
                if (playlistEl) {
                    playlistEl.addEventListener('dblclick', handleDoubleClick);
                }

                // Use official Webamp API for track changes
                webampInstance.onTrackDidChange(trackInfo => {
                    console.log("Track changed:", trackInfo);
                    handleTrackChange(trackInfo);
                });
            }, 1000);
        }

        // Add cleanup for background transition timeouts
        function cleanup() {
            stopAnimation();
            
            if (window.bgTransitionTimeout) {
                clearTimeout(window.bgTransitionTimeout);
                window.bgTransitionTimeout = null;
            }
            
            if (eqIntervalId) {
                clearInterval(eqIntervalId);
                eqIntervalId = null;
            }
            
            window.eqInitialized = false;
            
            if (webampInstance) {
                try {
                    webampInstance.close();
                } catch (e) {}
                webampInstance = null;
            }
            
            document.getElementById('webamp-container').innerHTML = '';
        }

        // Function to restart Webamp with a different skin
        async function restartWithDifferentSkin() {
            cleanup();
            usesCustomSkin = !usesCustomSkin;
            initWebamp();
        }

        // Password validation function
        function setupPasswordValidation() {
            const passwordInput = document.getElementById('password-input');
            const accessIndicator = document.getElementById('access-indicator');
            const passwordOverlay = document.getElementById('password-overlay');
            const correctPassword = ' ';
            
            // Show/hide the password label based on input
            passwordInput.addEventListener('input', function() {
                const label = document.getElementById('password-label');
                if (this.value) {
                    label.style.opacity = '0';
                } else {
                    label.style.opacity = '1';
                }
                
                // Add flashing effect when typing
                this.classList.add('flashing');
                setTimeout(() => {
                    this.classList.remove('flashing');
                }, 500);
            });

            // Check password on enter key
            passwordInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    checkPassword();
                }
            });

            // Password validation
            function checkPassword() {
                if (passwordInput.value.toLowerCase() === correctPassword) {
                    // Show success indicator
                    accessIndicator.classList.add('granted');
                    
                    // Initialize Webamp here before showing it
                    initWebamp().then((instance) => {
                        // Wait a moment, then fade out the overlay
                        setTimeout(() => {
                            passwordOverlay.style.opacity = '0';
                            passwordOverlay.style.pointerEvents = 'none';
                            passwordUnlocked = true;
                            
                            // After password overlay fades out, start the background fade
                            setTimeout(() => {
                                const currentBg = document.getElementById('current-background');
                                if (currentBg && currentBg.firstChild) {
                                    // Force a reflow before setting up the transition
                                    void currentBg.firstChild.offsetHeight;
                                    
                                    // Set up the fade-in transition
                                    currentBg.firstChild.style.transition = `opacity ${trackBackgrounds[0].fadeIn}s ease-in`;
                                    
                                    // Start the fade
                                    requestAnimationFrame(() => {
                                        currentBg.firstChild.style.opacity = '1';
                                    });
                                }
                                
                                // Ensure we have a player instance before starting playback
                                if (webampInstance) {
                                    playFirstTrack();
                                }
                            }, 2000); // Wait for password overlay to fade out
                        }, 700);
                    });
                } else {
                    // Show failure indication (shake the input)
                    passwordInput.style.animation = 'none';
                    void passwordInput.offsetWidth; // Trigger reflow
                    passwordInput.style.animation = 'shake 0.5s'; 
                }
            }
        }

        // Initialize everything when page loads
        document.addEventListener('DOMContentLoaded', () => {
            console.log('DOM loaded, setting up animation toggle...');
            
            // Start preloading backgrounds immediately
            preloadBackgrounds();
            
            // Setup password validation
            setupPasswordValidation();
            
            // Initialize animation state
            isAnimationEnabled = false;
            window.basePositions = null;
            
            // Setup animation toggle button
            const animToggleButton = document.getElementById('animation-toggle');
            if (animToggleButton) {
                // Remove any existing listeners
                animToggleButton.removeEventListener('click', toggleAnimation);
                // Add fresh click listener
                animToggleButton.addEventListener('click', toggleAnimation);
                // Reset to inactive state
                animToggleButton.classList.remove('active');
                console.log('Animation toggle button initialized');
            }

            // Hide the password overlay
            const passwordOverlay = document.getElementById('password-overlay');
            if (passwordOverlay) {
                passwordOverlay.style.opacity = '1';
                passwordOverlay.style.pointerEvents = 'auto';
            }

            // Focus on the password input
            setTimeout(() => {
                document.getElementById('password-input').focus();
            }, 500);
        });
        
        // Add shake animation for wrong password
        document.head.insertAdjacentHTML('beforeend', `
            <style>
                @keyframes shake {
                    0%, 100% { transform: translateX(0); }
                    10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
                    20%, 40%, 60%, 80% { transform: translateX(5px); }
                }
                
                .shake {
                    animation: shake 0.5s;
                }
            </style>
        `);

        // Add window resize handler to recenter when animation is off
        window.addEventListener('resize', () => {
            if (!isAnimationEnabled) {
                centerWindows();
            }
        });

        // Add additional code to prevent playlist reordering
        const preventPlaylistReorder = () => {
            const playlistTracks = document.querySelectorAll('#webamp .playlist-track');
            playlistTracks.forEach(track => {
                track.draggable = false;
                track.style.userSelect = 'none';
                track.addEventListener('mousedown', (e) => {
                    if (e.button === 0) { // Left click
                        e.preventDefault();
                        e.stopPropagation();
                    }
                }, true);
                track.addEventListener('dragstart', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                }, true);
            });
        };

        // Function to continuously ensure playlist is not reorderable
        const ensureNoReorder = () => {
            if (webampInstance) {
                preventPlaylistReorder();
            }
            setTimeout(ensureNoReorder, 1000);
        };

        // Start the ensure process
        ensureNoReorder();
    </script>
